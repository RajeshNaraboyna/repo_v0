# =============================================================================
# School Management System — All-in-One Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.allinone.yml up -d --build
#   docker compose -f docker-compose.allinone.yml down
#   docker compose -f docker-compose.allinone.yml down -v   # remove volumes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: scl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sclpass}
      POSTGRES_DB: ${POSTGRES_DB:-school_mgmt}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scluser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Milvus Dependencies — etcd
  # ---------------------------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: scl-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # Milvus Dependencies — MinIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: scl-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # Milvus Vector Database
  # ---------------------------------------------------------------------------
  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: scl-milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # SCL All-in-One (API + Frontend + RAG)
  # ---------------------------------------------------------------------------
  scl-app:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    container_name: scl-app
    restart: unless-stopped
    environment:
      # Application
      APP_NAME: ${APP_NAME:-school-management-system}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      HOST: ${HOST:-0.0.0.0}
      # API — Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scluser}:${POSTGRES_PASSWORD:-sclpass}@postgres:5432/${POSTGRES_DB:-school_mgmt}
      # API — Supabase
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      # API — Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALGORITHM: ${ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost","http://localhost:4001"]}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://127.0.0.1:4003}
      GUEST_ACCESS_ENABLED: ${GUEST_ACCESS_ENABLED:-true}
      GUEST_TOKEN_EXPIRE_MINUTES: ${GUEST_TOKEN_EXPIRE_MINUTES:-60}
      # RAG settings
      MILVUS_HOST: ${MILVUS_HOST:-milvus}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MILVUS_COLLECTION_NAME: ${MILVUS_COLLECTION_NAME:-student_results}
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
    ports:
      - "${FRONTEND_HOST_PORT:-4001}:80"    # Frontend (nginx)
      - "${API_HOST_PORT:-4002}:4002"        # API (direct, optional)
      - "${RAG_HOST_PORT:-4003}:4003"        # RAG (direct, optional)
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4002/health && curl -f http://localhost:4003/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
    driver: local
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local
