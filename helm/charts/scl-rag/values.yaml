replicaCount: 1

image:
  repository: scl-rag
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4003

env:
  APP_ENV: production
  DEBUG: "false"
  MILVUS_HOST: milvus
  MILVUS_PORT: "19530"
  CORS_ORIGINS: '["http://scl-frontend", "http://scl-api"]'

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
